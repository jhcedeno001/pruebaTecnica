services:
  db:
    image: postgres:16-alpine
    container_name: riesgo-proveedores-db-jhcedeno
    restart: unless-stopped
    environment:
      POSTGRES_DB: riesgo_proveedores
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d riesgo_proveedores"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: api-riesgo-proveedores:jhcedeno
    pull_policy: never
    container_name: riesgo-proveedores-api-jhcedeno
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      APP_NAME: API Riesgo Proveedores
      DEBUG: "True"
      CORS_ORIGINS: '["http://localhost:9642"]'

      DB_HOST: host.docker.internal
      DB_PORT: "5433"
      DB_NAME: riesgo_proveedores
      DB_USER: postgres
      DB_PASSWORD: postgres123

      COUNTRIES_API_BASE_URL: https://countries.dev
      COUNTRIES_API_TIMEOUT_SECONDS: "50"

      EXCHANGE_RATE_PRIMARY_URL: https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@{version}/v1/currencies/usd.json
      EXCHANGE_RATE_FALLBACK_URL: https://{version}.currency-api.pages.dev/v1/currencies/usd.json
      EXCHANGE_RATE_API_TIMEOUT_SECONDS: "50"

      GEO_REFERENCE_DATASET_URL: https://cdn.jsdelivr.net/gh/mledoze/countries@master/dist/countries.json
      GEO_REFERENCE_API_TIMEOUT_SECONDS: "50"

      CONFLICTS_DATASET_URL: https://ourworldindata.org/grapher/locations-of-ongoing-armed-conflicts.csv?csvType=full&useColumnShortNames=true
      CONFLICTS_API_TIMEOUT_SECONDS: "50"

      HTTP_BREAKER_FAIL_MAX: "5"
      HTTP_BREAKER_RESET_TIMEOUT_SECONDS: "30"
      HTTP_RATE_LIMIT_PER_SECOND: "5"
    ports:
      - "9541:9541"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9541/openapi.json')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  app:
    image: app-riesgo-proveedores:jhcedeno
    pull_policy: never
    container_name: riesgo-proveedores-app-jhcedeno
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "9642:80"

volumes:
  db_data:
